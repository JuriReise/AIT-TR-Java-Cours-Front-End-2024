<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Signup Form</h1>
    <form>
      <!-- Дефолтный блочный элемент - DIV-->
      <!-- Дефолтный строчный элемент - span-->
      <div>
        <!-- NAME -->
        <label for="name"> Name: </label>
        <input
          id="name"
          type="text"
          placeholder="Enter your Name..."
          required
        />
      </div>

      <br />

      <div>
        <!-- EMAIL -->
        <label for="email"> Email: </label>
        <input
          id="email"
          type="email"
          placeholder="Enter your Email..."
          required
        />
      </div>
      <br />

      <div>
        <!-- PASS -->
        <label for="password"> Password: </label>
        <input
          id="password"
          type="password"
          placeholder="Enter your password..."
          minlength="8"
          required
        />
      </div>

      <br />
      <div>
        <!-- HOBBY -->
        <label for="hobby"> Hobby: </label>
        <select id="hobby" required>
          <option value="">Choose your hobby!</option>
          <option value="Football">
            Football - best sport from all over the world!
          </option>
          <option value="Chess">
            Chess - best sport from all over the world!
          </option>
        </select>
      </div>
      <button>Finish</button>
    </form>
  </body>
</html>
